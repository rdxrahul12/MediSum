<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medisum // Medical Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #000000;
            --surface-dark: #09090b;
            --surface-light: #18181b;
            --primary: #06b6d4;
            /* Cyan 500 */
            --primary-glow: rgba(6, 182, 212, 0.5);
            --primary-dim: rgba(6, 182, 212, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #71717a;
            --border: #27272a;
            --success: #22c55e;
            --font-mono: 'JetBrains Mono', monospace;
            --font-ui: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 5px var(--primary-glow);
            }

            50% {
                box-shadow: 0 0 20px var(--primary-glow), 0 0 10px var(--primary);
            }

            100% {
                box-shadow: 0 0 5px var(--primary-glow);
            }
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-sizing: border-box;
            animation: slideInLeft 0.5s ease-out;
            z-index: 10;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-shadow: 0 0 10px var(--primary-dim);
        }

        .logo i {
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .sidebar-section {
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .sidebar-section:nth-child(2) {
            animation-delay: 0.1s;
        }

        .sidebar-section:nth-child(3) {
            animation-delay: 0.2s;
        }

        .sidebar-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 0.5rem;
            font-family: var(--font-ui);
            outline: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-dim);
        }

        select:hover {
            border-color: var(--text-muted);
        }

        .user-info {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease-out 0.3s forwards;
            opacity: 0;
        }

        .user-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .logout-btn {
            color: #ef4444;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 0.25rem;
            transition: transform 0.2s, text-shadow 0.2s;
        }

        .logout-btn:hover {
            transform: scale(1.1);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            overflow-y: auto;
            animation: fadeIn 0.6s ease-out;
        }

        .panel {
            background: var(--surface-dark);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .panel:hover {
            border-color: #3f3f46;
        }

        /* Upload Area */
        .upload-container {
            border: 2px dashed var(--border);
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--primary-dim);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .upload-container:hover {
            border-color: var(--primary);
            background: rgba(6, 182, 212, 0.08);
            box-shadow: 0 0 20px var(--primary-dim);
        }

        .upload-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.1), transparent);
            transition: 0.5s;
        }

        .upload-container:hover::after {
            left: 100%;
        }

        .hidden-input {
            display: none;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            resize: vertical;
            margin-top: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-dim);
        }

        .action-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            font-weight: 700;
            font-family: var(--font-mono);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--primary-glow);
            filter: brightness(1.1);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        /* Terminal Logs */
        .terminal {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            height: 150px;
            overflow-y: auto;
            display: none;
            /* Hidden by default */
            margin-bottom: 1.5rem;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out;
        }

        .log-line {
            margin: 0.25rem 0;
            display: flex;
            gap: 0.5rem;
            animation: fadeIn 0.2s ease-out;
        }

        .log-time {
            color: var(--text-muted);
        }

        .log-msg {
            color: var(--success);
            text-shadow: 0 0 5px rgba(34, 197, 94, 0.3);
        }

        .log-error {
            color: #ef4444;
            text-shadow: 0 0 5px rgba(239, 68, 68, 0.3);
        }

        /* Result Area */
        .result-container {
            display: none;
            /* Hidden by default */
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .result-title {
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        .copy-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
        }

        /* Markdown Styles */
        .markdown-output {
            line-height: 1.7;
            font-size: 1rem;
            color: #d4d4d8;
        }

        .markdown-output h1,
        .markdown-output h2,
        .markdown-output h3 {
            color: var(--primary);
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.25rem;
        }

        .markdown-output h1 {
            font-size: 1.5rem;
        }

        .markdown-output h2 {
            font-size: 1.25rem;
        }

        .markdown-output h3 {
            font-size: 1.1rem;
        }

        .markdown-output strong {
            color: #fff;
            font-weight: 700;
        }

        .markdown-output ul {
            padding-left: 1.5rem;
            list-style-type: none;
        }

        .markdown-output ul li {
            position: relative;
            margin-bottom: 0.5rem;
        }

        .markdown-output ul li::before {
            content: ">>";
            position: absolute;
            left: -1.5rem;
            color: var(--primary);
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .markdown-output p {
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-microchip"></i> MEDISUM_AI
        </div>

        <form id="config-form">



        </form>


    </aside>

    <main class="main-content">
        <!-- Input Panel -->
        <div class="panel">
            <div class="upload-container" onclick="document.getElementById('file-upload').click()">
                <i class="fas fa-file-upload fa-2x" style="color: var(--primary); margin-bottom: 0.5rem;"></i>
                <div>Initialise Upload Sequence</div>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">PDF / TXT supported</div>
            </div>
            <input id="file-upload" type="file" name="file" class="hidden-input" accept=".pdf,.txt"
                onchange="handleFileSelect(this)">

            <div id="file-name"
                style="margin-top: 10px; color: var(--success); font-family: var(--font-mono); font-size: 0.8rem; text-align: center;">
            </div>

            <textarea id="report_text" placeholder="// OR PASTE RAW DATA STREAM HERE..."></textarea>

            <button class="action-btn" onclick="startGeneration()">EXECUTE SUMMARY PROTOCOL</button>
        </div>

        <!-- Terminal Output -->
        <div id="terminal" class="terminal">
            <div class="log-line">
                <span class="log-time">00:00:00</span>
                <span class="log-msg" style="color: var(--text-muted);">System Ready. Awaiting input...</span>
            </div>
        </div>

        <!-- Final Result -->
        <div id="result-panel" class="panel result-container">
            <div class="result-header">
                <span class="result-title">:: SYNTHESIS COMPLETE ::</span>
                <button class="copy-btn" onclick="copyResult()">COPY DATA</button>
            </div>
            <div id="summary-content" class="markdown-output"></div>
        </div>
    </main>

    <script>
        function handleFileSelect(input) {
            const fileName = input.files[0] ? ">> FILE_LOADED: " + input.files[0].name : "";
            document.getElementById('file-name').innerText = fileName;
        }

        async function startGeneration() {
            const terminal = document.getElementById('terminal');
            const resultPanel = document.getElementById('result-panel');
            const summaryContent = document.getElementById('summary-content');

            // Reset UI
            terminal.style.display = 'block';
            resultPanel.style.display = 'none';
            terminal.innerHTML = '';
            summaryContent.innerHTML = '';

            // Prepare Data
            const formData = new FormData();



            const fileInput = document.getElementById('file-upload');
            if (fileInput.files[0]) {
                formData.append('file', fileInput.files[0]);
            }
            formData.append('report_text', document.getElementById('report_text').value);

            try {
                const response = await fetch('/stream_generate', {
                    method: 'POST',
                    body: formData
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const data = JSON.parse(line);

                            if (data.type === 'log') {
                                const logEntry = document.createElement('div');
                                logEntry.className = 'log-line';
                                logEntry.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString('en-GB', { hour12: false })}]</span> <span class="log-msg">${data.message}</span>`;
                                terminal.appendChild(logEntry);
                                terminal.scrollTop = terminal.scrollHeight;
                            } else if (data.type === 'result') {
                                resultPanel.style.display = 'block';
                                // Use marked to render markdown
                                summaryContent.innerHTML = marked.parse(data.content);
                                // Scroll to result
                                resultPanel.scrollIntoView({ behavior: 'smooth' });
                            } else if (data.type === 'error') {
                                const logEntry = document.createElement('div');
                                logEntry.className = 'log-line';
                                logEntry.innerHTML = `<span class="log-error">${data.message}</span>`;
                                terminal.appendChild(logEntry);
                            }
                        } catch (e) {
                            console.error("Parse error", e);
                        }
                    }
                }
            } catch (err) {
                const logEntry = document.createElement('div');
                logEntry.className = 'log-line';
                logEntry.innerHTML = `<span class="log-error">NETWORK ERROR: ${err.message}</span>`;
                terminal.appendChild(logEntry);
            }
        }

        function copyResult() {
            const text = document.getElementById('summary-content').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('DATA COPIED TO CLIPBOARD');
            });
        }
    </script>
</body>

</html>
